name: Deploy to Production

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Deploy Strapi to Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          command_timeout: 10m
          script: |
            set -e
            cd /opt/barbitch-strapi

            echo "Pulling latest changes..."
            git pull origin main

            echo "Installing dependencies..."
            NODE_ENV=development npm ci

            echo "Cleaning old build artifacts..."
            rm -rf dist

            echo "Building Strapi admin panel..."
            NODE_OPTIONS='--max-old-space-size=4096' npm run build

            echo "Verifying build..."
            test -f dist/build/index.html || { echo "BUILD FAILED: index.html not found!"; exit 1; }

            echo "Restarting PM2 process..."
            pm2 restart barbitch-strapi || pm2 start ecosystem.config.js

            pm2 save
            echo "Deployment completed!"
